<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃園二手機車整合網</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #ff4d4d; --dark: #121212; --card-bg: #1e1e1e; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--dark); color: var(--text); padding-bottom: 60px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .filter-btn.active { background: var(--primary); }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .car-card { background: var(--card-bg); padding: 15px; border-radius: 10px; text-align: center; }
        .car-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: auto; }
        .modal-content { background: #222; max-width: 600px; margin: 50px auto; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>桃園二手機車整合網</h1>
        <div class="btn-group">
            <button class="filter-btn active" onclick="filterBudget('all', this)">全部</button>
            <button class="filter-btn" onclick="filterBudget('low', this)">3萬內</button>
            <button class="filter-btn" onclick="filterBudget('mid', this)">3-6萬</button>
            <button class="filter-btn" onclick="filterBudget('high', this)">6-9萬</button>
        </div>
        <div class="car-grid" id="carGrid">載入中...</div>
    </div>

    <div id="carModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle"></h2>
            <img id="modalImg" src="" style="width:100%">
            <p id="modalPrice"></p>
            <p id="modalReport"></p>
            <button onclick="document.getElementById('carModal').style.display='none'">關閉</button>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWyzyQ_nG4H9IO1Idx7dJlvgpNub-KjGCfcNXWI6UVP92hH0u9njk16RpAYj7M6fDyXGHqm_S0CeMs/pub?output=csv";
        let globalCarData = [];

        Papa.parse(sheetUrl, {
            download: true, header: true,
            complete: function(results) {
                globalCarData = results.data
                    .filter(row => row['標題']?.trim())
                    .map((row, index) => ({
                        id: index,
                        name: row['標題'],
                        price: parseInt(row['價格']) || 0,
                        category: row['分類']?.trim() || 'mid',
                        mainImg: row['主圖網址'],
                        report: row['鑑定報告'] || '無鑑定資料'
                    }));
                filterBudget('all');
            }
        });

        function filterBudget(type, btn) {
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('carGrid');
            grid.innerHTML = '';
            const list = (type === 'all') ? globalCarData : globalCarData.filter(c => c.category === type);
            
            list.forEach(car => {
                grid.innerHTML += `
                    <div class="car-card">
                        <img src="${car.mainImg}">
                        <h3>${car.name}</h3>
                        <p>${car.price.toLocaleString()} 元</p>
                        <button onclick="openModal(${car.id})">詳情</button>
                    </div>`;
            });
        }

        function openModal(id) {
            const car = globalCarData.find(c => c.id === id);
            document.getElementById('modalTitle').innerText = car.name;
            document.getElementById('modalImg').src = car.mainImg;
            document.getElementById('modalPrice').innerText = "價格：" + car.price + " 元";
            document.getElementById('modalReport').innerText = "鑑定：" + car.report;
            document.getElementById('carModal').style.display = 'block';
        }
    </script>
</body>
</html>
