<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>桃園二手機車整合網</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .car-card { border: 1px solid #333; padding: 15px; margin: 10px; display: inline-block; width: 280px; background: #1e1e1e; border-radius: 10px; vertical-align: top; }
        img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; background: #333; }
        button { background: #e50914; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        #car-container { margin-top: 20px; }
        #carModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; z-index: 1000; }
        .modal-content { background: #222; margin: 50px auto; padding: 20px; width: 90%; max-width: 600px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>桃園二手機車整合網</h1>
    <!-- 確保這個 ID 存在，程式才不會報錯 -->
    <div id="car-container">正在載入車輛...</div>

    <div id="carModal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div id="modal-images"></div>
            <p id="modal-price"></p>
            <button onclick="document.getElementById('carModal').style.display='none'">關閉視窗</button>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSWyzyQ_nG4H9IO1Idx7dJlvgpNub-KjGCfcNXWI6UVP92hH0u9njk16RpAYj7M6fDyXGHqm_S0CeMs/pub?output=csv";
        let globalCarData = [];

        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            complete: function(results) {
                globalCarData = results.data.filter(row => row['標題'] && row['標題'].trim() !== "");
                renderCars();
            }
        });

        function renderCars() {
            const container = document.getElementById('car-container');
            if (!container) return; // 安全檢查
            container.innerHTML = '';
            globalCarData.forEach((car, index) => {
                const div = document.createElement('div');
                div.className = 'car-card';
                div.innerHTML = `<img src="${car['主圖網址']}"><h3>${car['標題']}</h3><p>${car['價格']} 元</p><button onclick="openModal(${index})">查看詳情</button>`;
                container.appendChild(div);
            });
        }

        function openModal(index) {
            const car = globalCarData[index];
            document.getElementById('modal-title').innerText = car['標題'];
            document.getElementById('modal-price').innerText = "價格：" + car['價格'] + " 元";
            document.getElementById('modal-images').innerHTML = `<img src="${car['主圖網址']}" style="width:100%"><br>` + 
                (car['副圖網址1'] ? `<img src="${car['副圖網址1']}" style="width:48%; margin:1%">` : '') +
                (car['副圖網址2'] ? `<img src="${car['副圖網址2']}" style="width:48%; margin:1%">` : '');
            document.getElementById('carModal').style.display = 'block';
        }
    </script>
</body>
</html>
